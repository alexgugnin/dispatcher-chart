apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart.fullname" . }}
  labels:
{{ include "chart.labels" . | indent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.kg_registrar.enabled }}
    - port: {{ .Values.kg_registrar.ports.service }}
      targetPort: registrar
      protocol: TCP
      name: registrar
    {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "chart.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- if .Values.async_dispatcher }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chart.fullname" . }}-redis
  labels:
{{ include "chart.labels" . | indent 4 }}-redis
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/name: {{ include "chart.name" . }}-redis
    app.kubernetes.io/instance: {{ .Release.Name }}-redis
{{- end }}
